name: CI

on: [ push, pull_request ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: [ '8.1', '8.2', '8.3', '8.4', '8.5' ]
    steps:
      - uses: actions/checkout@v6
      - uses: php-actions/composer@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: phpunit:9
      - run: phpunit